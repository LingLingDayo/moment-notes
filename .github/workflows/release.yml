name: Publish GitHub Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

env:
  ZIP_NAME: ""

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Extract Release Notes from CHANGELOG
        run: node scripts/extract-changelog.js

      - name: Create Source Code Archive
        run: |
          # 清理 tag 中的斜杠，防止因目录不存在导致打包失败（例如 release/v0.2.0）
          CLEANED_TAG=$(echo "${{ github.ref_name }}" | sed 's/\//-/g')
          ZIP_NAME="amber-notes-${CLEANED_TAG}.zip"
          git archive --format=zip --output="$ZIP_NAME" HEAD
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: |
            ${{ env.ZIP_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
